spring:
  application:
    name: eventslk-api-gateway
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  # ── Spring Cloud Gateway (servlet/MVC variant) routes ────────────────────────
  # Routes are resolved through Eureka via the `lb://` scheme.
  # RewritePath filters strip the public `/api/v1/...` prefix down to the path
  # the downstream controllers currently expose (`/auth/...`, `/event/...`).
  cloud:
    gateway:
      mvc:
        routes:
          - id: auth-route
            uri: lb://EVENT-REGISTRATION-API
            predicates:
              - Path=/api/v1/auth/**
            filters:
              - RewritePath=/api/v1/auth/(?<segment>.*), /auth/${segment}

          - id: events-route
            uri: lb://EVENT-REGISTRATION-API
            predicates:
              - Path=/api/v1/events/**
            filters:
              - RewritePath=/api/v1/events/(?<segment>.*), /event/${segment}

server:
  port: ${SERVER_PORT:8080}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://discovery:changeit@localhost:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
    # Unique instance ID visible in the Eureka dashboard
    instance-id: ${spring.application.name}:${server.port}

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
    prometheus:
      enabled: true
  prometheus:
    metrics:
      export:
        enabled: true

# ── JWT & public-path config consumed by JwtAuthenticationFilter ──────────────
app:
  jwt:
    secret: ${JWT_SECRET}               # Must be supplied via env / .env file
  gateway:
    # Requests matching these Ant patterns bypass JWT validation entirely.
    public-paths:
      - /api/v1/auth/login
      - /api/v1/auth/register
      - /api/v1/auth/signup
      - /api/v1/auth/verify-email
      - /api/v1/auth/resend-verification
      - /actuator/**
