spring:
  application:
    name: eventslk-api-gateway
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

server:
  port: ${SERVER_PORT:8080}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://discovery:changeit@localhost:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
    # Unique instance ID visible in the Eureka dashboard
    instance-id: ${spring.application.name}:${server.port}

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
    prometheus:
      enabled: true
  prometheus:
    metrics:
      export:
        enabled: true

# ── JWT & public-path config consumed by JwtAuthenticationFilter ──────────────
app:
  jwt:
    secret: ${JWT_SECRET}               # Must be supplied via env / .env file
  gateway:
    # Requests matching these Ant patterns bypass JWT validation entirely.
    public-paths:
      - /auth/signup
      - /auth/login
      - /actuator/**
